# example: https://wiki.openstreetmap.org/wiki/OSM_tags_for_routing/Telenav
# example2: https://wiki.openstreetmap.org/wiki/OSM_tags_for_routing/Valhalla
# example3: https://wiki.openstreetmap.org/wiki/Gojek/OSM_Tags_for_Routing
# https://wiki.openstreetmap.org/wiki/OSM_tags_for_routing
highway_whitelist:
  - motorway
  - motorway_link
  - trunk
  - trunk_link
  - primary
  - primary_link
  - secondary
  - secondary_link
  - residential
  - residential_link
  - service
  - tertiary
  - tertiary_link
  - road
  - track
  - unclassified
  - undefined
  - unknown
  - living_street
  - private

# see land-based transportation: https://wiki.openstreetmap.org/wiki/Key:access
# supported: motorcycle, car. todo: ( bicycle, foot, , bus, hgv, goods, taxi, minibus)
vehicle_type: motorcar
landmarks: 8

maxspeeds: # in km/h
  motorway: 100
  trunk: 60
  primary: 50
  secondary: 40
  tertiary: 40
  unclassified: 25
  residential: 25
  service: 15
  motorway_link: 50
  trunk_link: 40
  primary_link: 35
  secondary_link: 30
  tertiary_link: 25
  living_street: 25
  road: 30
  track: 15
  motorroad: 90
  default: 30

turncosts: # (see section 4.1 and 7: https://www.microsoft.com/en-us/research/wp-content/uploads/2013/01/crp_web_130724.pdf)
  # in seconds
  u_turn: 300 # ini adalah cost dari u-turn di two-way road (two-way road example: https://www.openstreetmap.org/way/1360292077)
  left_turn: 0
  right_turn: 0
  traffic_light: 0 # turn cost/penalty in seconds kalau di fromSegment->toSegment contains traffic light
  max_turn_cost_based_on_angle_between_edges: 25 # seconds

alternatives:
  alpha: # every subpath P' of alternative route with l(P') <= T = \alpha* l(Opt) is optimal (shortest path). l(Opt) is the cost/travel time of the shortest path
    default: 0.25
  gamma:
    15: 0.65
    20: 0.7 # alternative routes with great circle distance between source and destination <= 20km  at least 30% different than the shortest path
    50: 0.75 # alternative routes with great circle distance between source and destination <= 50km  at least 25% different than the shortest path
    default: 0.75 # alternative routes with great circle distance between source and destination > 50km  at least 25% different than the shortest path
  epsilon:
    default: 0.25 #  alternative routes at most 25% longer than the shortest path
  upper_bound:
    50: 1.28 # stop search when sum dari priority kedua node (dengan priority minimum) dari priority queue forward and backward search of multilevel-dijkstra (MLD) > \mu * upperBound
    default: 1.6 # untuk > 50 km, ini bagus buat rute alternative jarak jauh cnth: jogja solo
  max_candidates_to_unpack:
    10: 10 # great circle distance between source and destination <= 10km -> 10 via candidates to unpack
    20: 7 # great circle distance between source and destination <= 20km  & > 10km -> 7 via candidates to unpack
    50: 5
    100: 2
    default: 2

server:
  api_timeout: 5s
  read_timeout: 60s
  write_timeout: 0s # disable absolute response write deadline for long offline map matching requests
  idle_timeout: 240s # keep-alive tcp connection pool timeout
  read_header_timeout: 10s
  allowed_origins:
    - "*"
  http_version: http1.1 # http2 or http1.1
  max_request_body_size: 1 # in MB
  enable_pprof: false

guidance:
  left_hand: true # https://en.wikipedia.org/wiki/Left-_and_right-hand_traffic  , example: Indonesia is left-hand traffic

