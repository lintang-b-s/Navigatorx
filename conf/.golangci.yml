version: "2"

run:
  timeout: 5m
linters:
  exclusions:
    paths:
      - pkg/mobile
      - eval
  settings:
    errcheck:
      exclude-functions:
        # Files
        - (*os.File).Close
        - (*os.File).Write
        # Generic interfaces
        - (io.Closer).Close
        - (io.ReadCloser).Close # covers response.Body.Close()
        - (io.Writer).Write
        # Network
        - (net.Conn).Close
        # Bufio
        - (*bufio.Scanner).Close
        - (*bufio.Writer).Flush
        # s2 compression
        - (*github.com/klauspost/compress/s2.Writer).Close
        # Stdlib functions
        - fmt.Fprintf
        - io.Copy
        - net/http.ListenAndServe
        - os.Remove
        - (net.Listener).Close
        - (*zip.ReadCloser).Close
    staticcheck:
      checks:
        - "all"
        - "-ST1003"
        - "-ST1020"
    # gocritic:
    #   enabled-tags:
    #     - performance
    #   disabled-tags:
    #     - diagnostic
    #     - style
    #     - experimental
    #     - opinionated

  enable:
    - errcheck
    - staticcheck
    - govet
    - bodyclose
    - unused
    # - gocritic

  disable:
    - ineffassign
