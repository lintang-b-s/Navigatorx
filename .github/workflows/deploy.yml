name: Deploy NavigatorX Engine

on:
  push:
    branches:
      - main
      - deployment-demo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install gdown and download data
        run: |
          pip install gdown
          mkdir -p data
          gdown https://drive.google.com/uc?id=1uBoFWUSRka9pqH2dVPKpcystxXmkkSgs --output ./data
          gdown https://drive.google.com/uc?id=1PjYZk9wl5xSykqjak-ZFvlT427X1eSa0 --output ./data

      - name: Build and Preprocess
        run: |
          mkdir -p bin
          go build -o ./bin/preprocessor ./cmd/preprocessor
          ./bin/preprocessor -osm_file=./data/jabodetabek.osm.pbf -mlp_file=./data/jabodetabek.mlp -region=jabodetabek 
          ./bin/preprocessor

          go build -o ./bin/customizer ./cmd/customizer
          ./bin/customizer --region=jabodetabek
          ./bin/customizer

          go build -o ./bin/generator ./cmd/generator
          ./bin/generator --region=jabodetabek
          ./bin/generator

          go build -o ./bin/engine -pgo=auto ./cmd/engine

      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH Host
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host navigatorx-vps
            HostName $SSH_HOST
            User $SSH_USER
          EOF

      - name: Deploy to VPS
        run: |
          # Deploy engine safely using a temporary file
          scp ./bin/engine navigatorx-vps:~/navigatorx/engine_new
          ssh navigatorx-vps "chmod +x ~/navigatorx/engine_new && mv ~/navigatorx/engine_new ~/navigatorx/engine"
          
          # Sync profiles to a temporary directory to avoid partial data during rsync
          ssh navigatorx-vps "mkdir -p ~/navigatorx/data/profiles"
          rsync -avzP ./data/profiles/car/ navigatorx-vps:~/navigatorx/data/profiles/car_tmp/
          
          # Atomically swap the profiles directory
          ssh navigatorx-vps "
            rm -rf ~/navigatorx/data/profiles/car_old && \
            if [ -d ~/navigatorx/data/profiles/car ]; then mv ~/navigatorx/data/profiles/car ~/navigatorx/data/profiles/car_old; fi && \
            mv ~/navigatorx/data/profiles/car_tmp ~/navigatorx/data/profiles/car && \
            rm -rf ~/navigatorx/data/profiles/car_old
          "

      - name: Verify and Restart Service
        run: |
          ssh navigatorx-vps << 'EOF'
            set -e
            echo "Verifying deployment..."
            if [ -f ~/navigatorx/engine ] && [ -d ~/navigatorx/data/profiles/car ]; then
              echo "✅ Verification successful: Binary and profiles found."
            else
              echo "❌ Verification failed: Some files are missing."
              exit 1
            fi
            
            echo "🔄 Restarting NavigatorX Jabodetabek service..."
            sudo systemctl restart navigatorx-jkt
            echo "🔄 Restarting NavigatorX DIY,solo,semarang service..."
            sudo systemctl restart navigatorx-diy

            echo "📊 Service Status:"
            sudo systemctl status navigatorx-jkt --no-pager
            sudo systemctl status navigatorx-diy --no-pager
          EOF
